<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Signage Dashboard</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #000;
        }

        header {
            padding: 15px 30px;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 14px; font-weight: 700; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        /* WiFi Bereich */
        .wifi-config {
            display: none; /* Erst nach Login sichtbar */
            background: #f4f4f4;
            padding: 10px 15px;
            border-radius: 6px;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 5px; }
        .online .status-dot { background: #22c55e; box-shadow: 0 0 5px #22c55e; }

        button {
            background: #000; color: #fff; border: none;
            padding: 8px 16px; cursor: pointer; font-weight: 600; font-size: 13px;
        }

        #btnAction.reboot-mode { background: #ef4444; }
        .btn-save-wifi { background: #666; font-size: 11px; }

        main { flex-grow: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .locked { pointer-events: none; opacity: 0.4; filter: grayscale(1); }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <h1>Pi Signage Admin</h1>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span id="statusDisplay"><span class="status-dot"></span>Standby</span>
            <button id="btnAction">Connect</button>
        </div>
    </div>

    <div class="wifi-config" id="wifiSection">
        <span style="font-size: 12px; font-weight: bold;">Network:</span>
        <input type="text" id="ssid" placeholder="SSID">
        <input type="password" id="pw" placeholder="Passwort">
        <button class="btn-save-wifi" onclick="saveWifi()">Update WiFi</button>
    </div>
</header>

<main>
    <iframe id="uiFrame" class="locked"></iframe>
</main>

<script>
    const SERVICE_UUID = "610f8446-25e4-42d3-92af-6857f80cf6cd";
    const CHAR_UUIDS = {
        otp: "4d567391-5c91-4d73-9085-7d6e42e4b5a3",
        wifi: "1b355391-3b91-4d73-9085-7d6e42e4b5a0",
        config: "2b455391-3b91-4d73-9085-7d6e42e4b5a1",
        rclone: "3c566391-4c91-4d73-9085-7d6e42e4b5a2"
    };

    let bleDevice, characteristics = {};
    const btnAction = document.getElementById('btnAction');
    const frameEl = document.getElementById('uiFrame');

    // iFrame URL via GET Parameter
    const urlParams = new URLSearchParams(window.location.search);
    frameEl.src = urlParams.get('ui') || 'config.html';

    async function handleConnect() {
        try {
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'pi-signage' }],
                optionalServices: [SERVICE_UUID]
            });

            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);

            for (let key in CHAR_UUIDS) {
                characteristics[key] = await service.getCharacteristic(CHAR_UUIDS[key]);
            }

            // OTP Trigger
            await characteristics.otp.writeValue(new TextEncoder().encode("SHOWOTP"));
            const otp = window.prompt("OTP eingeben:");

            if (otp) {
                await characteristics.otp.writeValue(new TextEncoder().encode(otp));
                await loadData();
                setupRebootMode();
            }
        } catch (e) { console.error(e); }
    }

    async function loadData() {
        const decoder = new TextDecoder();

        // WiFi parsen (ssid:pw)
        const wifiRaw = decoder.decode(await characteristics.wifi.readValue());
        if (wifiRaw.includes(':')) {
            const [s, p] = wifiRaw.split(':');
            document.getElementById('ssid').value = s;
            document.getElementById('pw').value = p;
        }

        const data = {
            config: decoder.decode(await characteristics.config.readValue()),
            rclone: decoder.decode(await characteristics.rclone.readValue())
        };

        document.getElementById('wifiSection').style.display = 'flex';
        document.getElementById('statusDisplay').className = "online";
        frameEl.classList.remove('locked');
        frameEl.contentWindow.postMessage({ type: 'INIT_DATA', data }, '*');
    }

    async function saveWifi() {
        const val = `${document.getElementById('ssid').value}:${document.getElementById('pw').value}`;
        await characteristics.wifi.writeValue(new TextEncoder().encode(val));
        alert("WiFi gespeichert.");
    }

    function setupRebootMode() {
        btnAction.innerText = "Disconnect & Reboot";
        btnAction.className = "reboot-mode";
        btnAction.onclick = async () => {
            if (confirm("System neu starten?")) {
                await characteristics.otp.writeValue(new TextEncoder().encode("REBOOT"));
                setTimeout(() => window.location.reload(), 800);
            }
        };
    }

    window.addEventListener('message', async (event) => {
        if (event.data.type === 'SAVE_DATA') {
            await characteristics[event.data.key].writeValue(new TextEncoder().encode(event.data.value));
            alert("Erfolgreich übertragen.");
        }
    });

    btnAction.onclick = handleConnect;
</script>
</body>
</html>
