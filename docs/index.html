<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Signage Dashboard</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #000;
        }

        header {
            padding: 15px 30px;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 14px;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .wifi-config {
            display: none;
            background: #f4f4f4;
            padding: 10px 15px;
            border-radius: 6px;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
            display: inline-block;
            margin-right: 8px;
            transition: 0.3s;
        }

        .status-working .status-dot {
            background: #f59e0b;
            box-shadow: 0 0 5px #f59e0b;
        }

        .status-online .status-dot {
            background: #22c55e;
            box-shadow: 0 0 5px #22c55e;
        }

        .status-error .status-dot {
            background: #ef4444;
            box-shadow: 0 0 5px #ef4444;
        }

        #statusText {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            color: #666;
        }

        button {
            background: #000;
            color: #fff;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            border-radius: 4px;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        #btnAction.reboot-mode {
            background: #ef4444;
        }

        main {
            flex-grow: 1;
            position: relative;
            background: #fafafa;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .locked {
            pointer-events: none;
            opacity: 0.3;
            filter: grayscale(1);
        }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <h1>Pi Signage Admin</h1>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div id="statusWrapper">
                <span class="status-dot"></span><span id="statusText">Standby</span>
            </div>
            <button id="btnAction">Connect</button>
        </div>
    </div>

    <div class="wifi-config" id="wifiSection">
        <span style="font-size: 12px; font-weight: bold;">Network:</span>
        <input type="text" id="ssid" onchange="updateWifi" placeholder="SSID">
        <input type="password" id="pw" onchange="updateWifi" placeholder="Passwort">
    </div>
</header>

<main>
    <iframe id="uiFrame" class="locked"></iframe>
</main>

<script>
    const SERVICE_UUID = "610f8446-25e4-42d3-92af-6857f80cf6cd";
    const CHAR_UUIDS = {
        otp: "4d567391-5c91-4d73-9085-7d6e42e4b5a3",
        wifi: "1b355391-3b91-4d73-9085-7d6e42e4b5a0",
        config: "2b455391-3b91-4d73-9085-7d6e42e4b5a1",
        rclone: "3c566391-4c91-4d73-9085-7d6e42e4b5a2"
    };

    let bleDevice, bleServer, characteristics = {};
    const btnAction = document.getElementById('btnAction');
    const statusWrapper = document.getElementById('statusWrapper');
    const statusText = document.getElementById('statusText');
    const frameEl = document.getElementById('uiFrame');

    const urlParams = new URLSearchParams(window.location.search);
    frameEl.src = urlParams.get('ui') || 'config.html';

    const delay = ms => new Promise(res => setTimeout(res, ms));

    function setUIStatus(type, label) {
        statusText.innerText = label;
        statusWrapper.className = "status-" + type;
    }

    async function handleConnect() {
        if (btnAction.disabled) return;

        try {
            btnAction.disabled = true;
            characteristics = {}; // Reset

            setUIStatus("working", "Selecting Device...");
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{name: 'pi-signage'}],
                optionalServices: [SERVICE_UUID]
            });

            bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

            setUIStatus("working", "Connecting...");
            await delay(100);
            bleServer = await bleDevice.gatt.connect();
            await delay(100);
            setUIStatus("working", "Discovering Services...");
            const service = await bleServer.getPrimaryService(SERVICE_UUID);
            await delay(100);
            // Charakteristiken nacheinander abrufen
            for (let key in CHAR_UUIDS) {
                setUIStatus("working", `Binding ${key.toUpperCase()}...`);
                characteristics[key] = await service.getCharacteristic(CHAR_UUIDS[key]);
                await delay(100);
            }

            setUIStatus("working", "Triggering OTP...");
            await characteristics.otp.writeValueWithResponse(new TextEncoder().encode("SHOWOTP"));
            await delay(100);
            const otp = window.prompt("Bitte 6-stelligen OTP vom Display eingeben:");
            if (!otp) {
                await bleDevice.gatt.disconnect();
                throw new Error("Cancelled");
            }

            setUIStatus("working", "Authenticating...");
            await characteristics.otp.writeValueWithResponse(new TextEncoder().encode(otp));
            await delay(100);
            await loadData();

            setupRebootMode();
        } catch (e) {
            console.error("BT-Error:", e);
            setUIStatus("error", e.name === "NetworkError" ? "Busy / Refused" : e.message);
            btnAction.disabled = false;
        }
    }

    let data = {};
    let newData = {}

    async function loadData() {
        const decoder = new TextDecoder();
        try {
            setUIStatus("working", "Downloading Data...");

            data = {
                wifi: decoder.decode(await characteristics.wifi.readValue()),
                config: decoder.decode(await characteristics.config.readValue()),
                rclone: decoder.decode(await characteristics.rclone.readValue())
            };

            document.getElementById('wifiSection').style.display = 'flex';
            document.getElementById("ssid").value = data.wifi.split(":")[0];
            document.getElementById("pw").value = data.wifi.split(":")[1];
            setUIStatus("online", "Connected");
            frameEl.classList.remove('locked');
            frameEl.contentWindow.postMessage({type: 'INIT_DATA', data}, '*');
        } catch (err) {
            throw new Error("Load Failed");
        }
    }

    async function updateWifi() {
        const ssid = document.getElementById("ssid").value;
        const pw = document.getElementById("pw").value;
        newData.wifi = ssid + ":" + pw;
    }

    function setupRebootMode() {
        btnAction.disabled = false;
        btnAction.innerText = "Save & Reboot";
        btnAction.className = "reboot-mode";
        btnAction.onclick = async () => {
            if (confirm("Änderungen speichern?")) {
                try {
                    for (let key in newData) {
                        if (data[key] !== newData[key]) {
                            setUIStatus("working", "sending " + key + "...");
                            await characteristics[key].writeValueWithResponse(new TextEncoder().encode(newData[key]));
                            data[key] = newData[key];
                        }
                    }
                } catch (e) {
                    setUIStatus("error", "failed to save " + key);
                }
            }

            if (confirm("System jetzt neu starten?")) {
                try {
                    await characteristics.otp.writeValueWithResponse(new TextEncoder().encode("REBOOT"));
                    setUIStatus("working", "Rebooting Pi...");
                    setTimeout(() => {
                        bleDevice.gatt.disconnect();
                        window.location.reload();
                    }, 1000);
                } catch (e) {
                    window.location.reload();
                }
            }
        };
    }

    function onDisconnected() {
        setUIStatus("error", "Disconnected");
        btnAction.disabled = false;
        btnAction.innerText = "Connect";
        btnAction.className = "";
        frameEl.classList.add('locked');
        document.getElementById('wifiSection').style.display = 'none';
    }

    window.addEventListener('message', async (event) => {
        if (event.data.type === 'SAVE_DATA') {
            newData[event.data.key] = event.data.value;
        }
    });

    btnAction.onclick = handleConnect;
</script>
</body>
</html>
